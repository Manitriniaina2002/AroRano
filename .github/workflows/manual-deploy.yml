name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - backend
          - frontend
          - both
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps --include=dev
      
      - name: Build backend
        working-directory: backend
        run: npm run build
      
      - name: Verify build
        working-directory: backend
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed"
            exit 1
          fi
      
      - name: Trigger Render deployment
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL not configured"
            exit 1
          fi
          
          curl -X POST "$DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{\"message\": \"Manual deployment from GitHub Actions\"}"
          
          echo "✓ Deployment triggered"
      
      - name: Create deployment notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number || 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Manual backend deployment triggered to **${{ github.event.inputs.environment }}**'
            });

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'frontend' || github.event.inputs.service == 'both'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://arorano-backend.onrender.com' }}
        run: npm run build
      
      - name: Verify build
        working-directory: frontend
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed"
            exit 1
          fi
      
      - name: Deploy to Vercel
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          scope: ${{ secrets.VERCEL_ORG_ID }}
          prod: true
      
      - name: Create deployment notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number || 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Manual frontend deployment to **${{ github.event.inputs.environment }}** completed\n\n📍 Production: https://arorano.vercel.app'
            });

  notification:
    name: Send Completion Notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.deploy-backend.result }}" = "success" ] || [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed - check logs above"
          fi
