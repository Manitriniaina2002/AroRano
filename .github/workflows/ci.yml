name: CI - Code Quality & Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-backend:
    name: Lint Backend Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps --include=dev
      
      - name: Run ESLint
        working-directory: backend
        run: |
          if [ -f "eslint.config.js" ] || [ -f "eslint.config.mjs" ] || [ -f "eslint.config.cjs" ] || [ -f ".eslintrc" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.cjs" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.yaml" ] || [ -f ".eslintrc.yml" ]; then
            npm run lint --if-present
          else
            echo "No ESLint config found in backend, skipping lint"
          fi

  lint-frontend:
    name: Lint Frontend Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      
      - name: Run ESLint
        working-directory: frontend
        run: |
          if [ -f "eslint.config.js" ] || [ -f "eslint.config.mjs" ] || [ -f "eslint.config.cjs" ] || [ -f ".eslintrc" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.cjs" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.yaml" ] || [ -f ".eslintrc.yml" ]; then
            npm run lint --if-present
          else
            echo "No ESLint config found in frontend, skipping lint"
          fi

  type-check-backend:
    name: Type Check Backend (TypeScript)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps --include=dev
      
      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

  type-check-frontend:
    name: Type Check Frontend (TypeScript)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      
      - name: Type check
        working-directory: frontend
        run: npm run type-check --if-present || npx tsc --noEmit

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit (Backend)
        working-directory: backend
        run: npm audit --audit-level=moderate || true
      
      - name: Run npm audit (Frontend)
        working-directory: frontend
        run: npm audit --audit-level=moderate || true

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, type-check-backend, type-check-frontend, security-scan]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint-backend.result }}" != "success" ] && [ "${{ needs.lint-backend.result }}" != "skipped" ]; then
            echo "❌ Backend linting failed"
            exit 1
          fi
          if [ "${{ needs.lint-frontend.result }}" != "success" ] && [ "${{ needs.lint-frontend.result }}" != "skipped" ]; then
            echo "❌ Frontend linting failed"
            exit 1
          fi
          if [ "${{ needs.type-check-backend.result }}" != "success" ]; then
            echo "❌ Backend type checking failed"
            exit 1
          fi
          if [ "${{ needs.type-check-frontend.result }}" != "success" ]; then
            echo "❌ Frontend type checking failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
