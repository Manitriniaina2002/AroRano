services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: arorano-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-arorano}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arorano_password}
      POSTGRES_DB: ${DB_NAME:-arorano}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-arorano}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arorano-network

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arorano-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-arorano}
      DB_PASSWORD: ${DB_PASSWORD:-arorano_password}
      DB_NAME: ${DB_NAME:-arorano}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arorano-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arorano-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      BACKEND_API_URL: http://backend:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - arorano-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  arorano-network:
    driver: bridge
