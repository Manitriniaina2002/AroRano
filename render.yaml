databases:
  - name: arorano-db
    databaseName: arorano
    user: arorano

services:
  - type: web
    name: arorano-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: arorano-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://arorano-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://arorano-frontend.onrender.com

  - type: web
    name: arorano-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://arorano-backend.onrender.com