version: '3.8'

services:
  # PostgreSQL Database for Development
  postgres:
    image: postgres:16-alpine
    container_name: arorano-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME:-arorano}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arorano_password}
      POSTGRES_DB: ${DB_NAME:-arorano}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-arorano}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arorano-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  arorano-network:
    driver: bridge
